<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MedSkills | Вход</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-title">🏥 MedSkills</div>
        <div class="auth-sub">Вход для молодых врачей</div>

        <div id="authForm">
            <div class="input-group">
                <label>Логин</label>
                <input type="text" id="loginUsername" placeholder="doctor_ivanov" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••">
            </div>
            <button class="auth-btn" id="doLoginBtn">Войти</button>
            <div class="auth-switch">
                Нет аккаунта? <span id="switchToRegister">Зарегистрироваться</span>
            </div>
            <div id="authError" class="error-message hidden"></div>
        </div>

        <div id="regForm" class="hidden">
            <div class="input-group">
                <label>Логин</label>
                <input type="text" id="regUsername" placeholder="doctor_ivanov">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="минимум 3 символа">
            </div>
            <button class="auth-btn" id="doRegisterBtn">Создать аккаунт</button>
            <div class="auth-switch">
                Уже есть аккаунт? <span id="switchToLogin">Войти</span>
            </div>
            <div id="regError" class="error-message hidden"></div>
        </div>

        <div style="margin-top: 1rem; font-size:0.75rem; text-align:center; color:#7a9aaa;">
            🔬 Демо: doctor / 123
        </div>
    </div>

    <script>
        // Проверка, если уже залогинены — редирект
        if (getCurrentUser()) {
            window.location.href = "tasks.html";
        }

        const authForm = document.getElementById("authForm");
        const regForm = document.getElementById("regForm");
        const authError = document.getElementById("authError");
        const regError = document.getElementById("regError");

        document.getElementById("switchToRegister").addEventListener("click", () => {
            authForm.classList.add("hidden");
            regForm.classList.remove("hidden");
            authError.classList.add("hidden");
            regError.classList.add("hidden");
        });

        document.getElementById("switchToLogin").addEventListener("click", () => {
            authForm.classList.remove("hidden");
            regForm.classList.add("hidden");
            authError.classList.add("hidden");
            regError.classList.add("hidden");
        });

        document.getElementById("doLoginBtn").addEventListener("click", () => {
            const login = document.getElementById("loginUsername").value.trim();
            const pwd = document.getElementById("loginPassword").value;
            const user = findUserByLogin(login);
            if (!user || user.passwordHash !== hashPassword(pwd)) {
                authError.innerText = "Неверный логин или пароль";
                authError.classList.remove("hidden");
                return;
            }
            sessionStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify({ login: user.login }));
            window.location.href = "tasks.html";
        });

        document.getElementById("doRegisterBtn").addEventListener("click", () => {
            const login = document.getElementById("regUsername").value.trim();
            const pwd = document.getElementById("regPassword").value;
            if (login.length < 3) {
                regError.innerText = "Логин должен содержать минимум 3 символа";
                regError.classList.remove("hidden");
                return;
            }
            if (pwd.length < 3) {
                regError.innerText = "Пароль минимум 3 символа";
                regError.classList.remove("hidden");
                return;
            }
            const users = getUsers();
            if (users.find(u => u.login === login)) {
                regError.innerText = "Пользователь с таким логином уже существует";
                regError.classList.remove("hidden");
                return;
            }
            const newUser = {
                login: login,
                passwordHash: hashPassword(pwd),
                solvedTasks: [],
                totalPoints: 0
            };
            users.push(newUser);
            saveUsers(users);
            alert("Регистрация успешна! Теперь войдите.");
            document.getElementById("switchToLogin").click();
            document.getElementById("loginUsername").value = login;
        });
    </script>
</body>

</html>
